<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criação de Personagem</title>
    <link rel="stylesheet" href="stylecriacao.css">
</head>
<body>
    <h1>Personagem</h1>
    <div class="info">
        <p>Nome:</p><input type="text" class="nome">
        <p>Idade:</p><input type="text" class="idade">
    </div>

    <div class="info">
        <p>Raça:</p><input type="text" class="raca">
        <p>Classe:</p><input type="text" class="classe">
    </div>

    <div class="info">
        <p>Classe social:</p>
        <select class="social">
            <option>Indiferente</option>
            <option>Muito pobre</option>
            <option>Pobre</option>
            <option>Classe média</option>
            <option>Rico</option>
            <option>Muito rico</option>
        </select>
    </div>
    <br>
    <div class="info">
        <p>História:</p> <textarea class="historia" rows="4" cols="50" wrap="hard" placeholder="Escreva uma breve história sobre o seu personagem (origem, família, época, motivações)"></textarea>
    </div>
    <br>
    <div class="info">
        <p>Armas e <br> Equipamentos:</p> <textarea class="armas" rows="4" cols="50" wrap="hard" placeholder="Quais armas e equipamentos seu personagem usa?"></textarea>
    </div>
    <br>
    <div class="info">
        <p>Aparência e <br> Personalidade</p> <textarea class="aparencia" rows="4" cols="50" wrap="hard" placeholder="Descreva as principais características do seu personagem: Rosto, físico, roupas, altura, temperamento, gostos, etc"></textarea>
    </div>
    <br>
    <div class="info">
        <p>Atributos e <br> Habilidades</p> <textarea class="habilidades" rows="4" cols="50" wrap="hard" placeholder="Quais poderes, conhecimentos e habilidaes o seu personagem possui?"></textarea>
    </div>

    <div class="save">
        <button class="saveprint">Salvar JPEG</button>
        <button class="saveprint">Salvar PDF</button>
        <button class="saveprint">Salvar .txt</button>
    </div>

    <div class="back">
        <a href="../incio.html"><button class="buttonback">←Voltar</button></a>
    </div>

</body>
</html>
