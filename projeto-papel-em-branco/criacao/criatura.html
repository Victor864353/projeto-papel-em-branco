<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criação de Criaturas</title>
    <link rel="stylesheet" href="stylecriacao.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="conteudo-para-salvar">
        <h1>Criaturas</h1>
        <div class="info">
            <p>Nome:</p><input type="text" id="nomecriatura" class="nomecriatura" placeholder="Ex: Tigre branco gigante das neves">
            <p>Idade:</p>
            <select id="idadecriatura" class="idadecriatura">
                <option>Recém-nascido</option>
                <option>Jovem</option>
                <option>Adulto</option>
                <option>Velho</option>
                <option>Muito velho</option>
            </select>
        </div>
        <div class="info">
            <p>Movimentação:</p>
            <select id="movimentacao" class="movimentacao">
                <option>Bípede</option>
                <option>Quadrúpede</option>
                <option>Rastejante</option>
                <option>Flutuante</option>
                <option>Voador</option>
                <option>Teletransporte</option>
            </select>
            <p>Inteligência:</p>
            <select id="inteligencia" class="inteligencia">
                <option>Irracional</option>
                <option>Racional</option>
                <option>Alta inteligência</option>
            </select>
            <p>Origem:</p>
            <select id="origem" class="origem">
                <option>Reprodução Natural</option>
                <option>Sobrenatural</option>
                <option>Invocação</option>
                <option>Alienígena</option>
                <option>Mutação</option>
                <option>Artificial</option>
                <option>Angelical</option>
                <option>Infernal</option>
            </select>
        </div>
        <div class="info">
            <p>Nível de perigo</p>
            <select id="perigo" class="perigo">
                <option>Neutro</option>
                <option>Extremamente dócil</option>
                <option>Dócil</option>
                <option>Pacífico</option>
                <option>Agressivo</option>
                <option>Perigoso</option>
                <option>Extremamente perigoso</option>
                <option>Mortal</option>
            </select>
            <p>Alimentação</p>
            <select id="alimentacao" class="alimentacao">
                <option>Não necessita</option>
                <option>Herbívoro</option>
                <option>Carnívoro</option>
                <option>Onívoro</option>
                <option>Fotossíntese</option>
                <option>Sangue</option>
                <option>Energia</option>
                <option></option>
                <option>Mortal</option>
            </select>
        </div>
        <div class="info">
            <p>Domesticável:</p>
            <select id="domesticavel" class="domesticavel">
                <option>Não</option>
                <option>Sim</option>
            </select>
            <p>Anda em grupos:</p>
            <select id="grupo" class="grupo">
                <option>Não</option>
                <option>Sim</option>
                <OPtion>Ocasionalmente</OPtion>
            </select>
        </div>
        <br>
        <div class="info2">
            <p>Habitat:</p>
            <input type="text" id="habitat" class="habitat" placeholder="Ex: cavernas, florestas, lagos, ..."></input>
        </div>
        <div class="info2">
            <p>Habitos e<br>Comportamento:</p>
            <textarea type="text" id="habitos" class="habitos" rows="4" wrap="hard" placeholder="Ex: Territorialista, gosta de frio, agressivo, se alimenta de animais de médio porte, ..."></textarea>
        </div>
        <div class="info2">
            <p>Aparência:</p>
            <textarea type="text" id="aparenciacriatura" class="aparenciacriatura" rows="4" wrap="hard" placeholder="Ex: Pelos, tamanho, físico, cores, camuflagem, olhos, orelha, dentes, ..."></textarea>
        </div>
        <div class="info2">
            <p>Habilidades<br> e Atributos:</p>
            <textarea type="text" id="habilidadescriatura" class="habilidadescriatura" rows="4" wrap="hard" placeholder="Ex: capaz de invocar e atirar gelo, extremamente rápido, ..."></textarea>
        </div>
        <div class="info2">
            <p>Uso:</p>
            <input type="text" id="uso" class="uso" placeholder="Sua função para civilizações. Ex: montaria, pele, carne, armas, poderes..."></input>
        </div>
    </div>

    <div class="save">
        <button id="btn-jpeg" class="saveprint">Salvar JPEG</button>
        <button id="btn-pdf" class="saveprint">Salvar PDF</button>
        <button id="btn-txt" class="saveprint">Salvar .txt</button>
    </div>

    <div class="back">
        <a href="../index.html"><button class="buttonback">←Voltar</button></a>
    </div>
    <script src="salvamento/salvamento-criatura.js"></script>
</body>
</html>
